<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Microgrid Panel Designer</title>
  <desc id="desc">Electrical panel schematic with breaker configuration for SLD, GA, and BOM design.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#0f1a2c"/>
      <stop offset="1" stop-color="#1a2e4a"/>
    </linearGradient>
    <radialGradient id="panel-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e8f0f8"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <!-- Outer background circles for depth -->
  <circle cx="512" cy="512" r="420" fill="none" stroke="#14233c" stroke-width="2" opacity="0.4"/>
  <circle cx="512" cy="512" r="380" fill="none" stroke="#1a2e4a" stroke-width="2" opacity="0.6"/>
  
  <!-- Main panel -->
  <rect x="160" y="160" width="704" height="704" rx="40" fill="url(#panel-bg)" stroke="#646d80" stroke-width="14"/>
  <rect x="188" y="188" width="648" height="648" rx="28" fill="#fafbfc" stroke="#8299b0" stroke-width="8"/>
  
  <!-- Center divider -->
  <line x1="512" y1="210" x2="512" y2="814" stroke="#9eb0d0" stroke-width="6"/>
  
  <!-- Top busbar line -->
  <line x1="200" y1="220" x2="824" y2="220" stroke="#3cb8ad" stroke-width="10" stroke-linecap="round"/>
  <circle cx="280" cy="220" r="12" fill="#3cb8ad"/>
  <circle cx="380" cy="220" r="12" fill="#3cb8ad"/>
  <circle cx="512" cy="220" r="12" fill="#3cb8ad"/>
  <circle cx="644" cy="220" r="12" fill="#3cb8ad"/>
  <circle cx="744" cy="220" r="12" fill="#3cb8ad"/>
  
  <!-- Left side breakers -->
  <rect x="240" y="280" width="80" height="100" rx="8" fill="#142847" stroke="#506a8a" stroke-width="5"/>
  <rect x="258" y="305" width="44" height="20" fill="#f0b43c"/>
  
  <rect x="240" y="420" width="80" height="100" rx="8" fill="#142847" stroke="#506a8a" stroke-width="5"/>
  <rect x="258" y="445" width="44" height="20" fill="#f0b43c"/>
  
  <rect x="240" y="560" width="80" height="100" rx="8" fill="#142847" stroke="#506a8a" stroke-width="5"/>
  <rect x="258" y="585" width="44" height="20" fill="#f0b43c"/>
  
  <!-- Right side breakers -->
  <rect x="704" y="280" width="80" height="100" rx="8" fill="#142847" stroke="#506a8a" stroke-width="5"/>
  <rect x="722" y="305" width="44" height="20" fill="#3cb8ad"/>
  
  <rect x="704" y="420" width="80" height="100" rx="8" fill="#142847" stroke="#506a8a" stroke-width="5"/>
  <rect x="722" y="445" width="44" height="20" fill="#3cb8ad"/>
  
  <rect x="704" y="560" width="80" height="100" rx="8" fill="#142847" stroke="#506a8a" stroke-width="5"/>
  <rect x="722" y="585" width="44" height="20" fill="#3cb8ad"/>
  
  <!-- Bottom return line -->
  <line x1="200" y1="804" x2="824" y2="804" stroke="#c86464" stroke-width="10" stroke-linecap="round"/>
  <circle cx="280" cy="804" r="12" fill="#c86464"/>
  <circle cx="380" cy="804" r="12" fill="#c86464"/>
  <circle cx="512" cy="804" r="12" fill="#c86464"/>
  <circle cx="644" cy="804" r="12" fill="#c86464"/>
  <circle cx="744" cy="804" r="12" fill="#c86464"/>
  
  <!-- Connecting lines -->
  <line x1="280" y1="220" x2="280" y2="270" stroke="#8ab0d0" stroke-width="4" opacity="0.7"/>
  <line x1="280" y1="710" x2="280" y2="804" stroke="#8ab0d0" stroke-width="4" opacity="0.7"/>
  <line x1="744" y1="220" x2="744" y2="270" stroke="#8ab0d0" stroke-width="4" opacity="0.7"/>
  <line x1="744" y1="710" x2="744" y2="804" stroke="#8ab0d0" stroke-width="4" opacity="0.7"/>
</svg>